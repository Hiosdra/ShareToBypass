name: Release to Google Play

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish (e.g., v1.0.0)'
        required: true
        type: string
      track:
        description: 'Release track (internal/alpha/beta/production)'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  release:
    name: Build and Release to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get release information
        id: release-info
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            RELEASE_NAME="${{ github.event.release.name }}"
            RELEASE_BODY="${{ github.event.release.body }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
            # Fetch release info using GitHub API
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/$RELEASE_TAG")
            RELEASE_NAME=$(echo "$RELEASE_DATA" | jq -r '.name // ""')
            RELEASE_BODY=$(echo "$RELEASE_DATA" | jq -r '.body // ""')
            IS_PRERELEASE=$(echo "$RELEASE_DATA" | jq -r '.prerelease // false')
          fi
          
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          
          # Save release body to file for later processing
          echo "$RELEASE_BODY" > /tmp/release_body.txt

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ steps.release-info.outputs.tag }}"
          # Remove 'v' prefix if exists
          VERSION=${TAG#v}
          # Extract version name (e.g., 1.0.0 from v1.0.0-alpha)
          VERSION_NAME=$(echo $VERSION | sed 's/-.*$//')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "full=$VERSION" >> $GITHUB_OUTPUT

      - name: Create What's New notes from release
        run: |
          mkdir -p whatsnew
          
          # Read release body and use it for all languages (English only)
          RELEASE_BODY=$(cat /tmp/release_body.txt)
          
          # Truncate to 500 characters and save for all language codes
          echo "$RELEASE_BODY" | head -c 500 > whatsnew/whatsnew-en-US
          
          echo "📝 What's New notes created:"
          cat whatsnew/whatsnew-en-US

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $ENCODED_KEYSTORE | base64 --decode > app/release-keystore.jks

      - name: Decode Google Play Service Account JSON
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          echo $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON > service-account.json

      - name: Update version in build.gradle.kts
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="${{ steps.version.outputs.name }}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          
          # Update versionCode and versionName
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
          
          echo "📦 Version updated:"
          echo "  versionCode: $VERSION_CODE"
          echo "  versionName: $VERSION_NAME"

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release-keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Determine release track
        id: release-track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "track=${{ inputs.track }}" >> $GITHUB_OUTPUT
          else
            # Auto-detect from tag and prerelease status
            TAG="${{ steps.release-info.outputs.tag }}"
            IS_PRERELEASE="${{ steps.release-info.outputs.is_prerelease }}"
            
            if [[ $TAG == *"-alpha"* ]]; then
              echo "track=alpha" >> $GITHUB_OUTPUT
            elif [[ $TAG == *"-beta"* ]]; then
              echo "track=beta" >> $GITHUB_OUTPUT
            elif [[ $TAG == *"-internal"* ]]; then
              echo "track=internal" >> $GITHUB_OUTPUT
            elif [[ "$IS_PRERELEASE" == "true" ]]; then
              # If marked as prerelease but no specific track, use beta
              echo "track=beta" >> $GITHUB_OUTPUT
            else
              # Normal release goes to production
              echo "track=production" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "🚀 Release track: $(cat $GITHUB_OUTPUT | grep track | cut -d'=' -f2)"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: com.hiosdra.smryshare
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ steps.release-track.outputs.track }}
          status: completed
          whatsNewDirectory: whatsnew/
          mappingFile: app/build/outputs/mapping/release/mapping.txt

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload mapping file
        uses: actions/upload-artifact@v7
        with:
          name: mapping-file
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f app/release-keystore.jks
          rm -f service-account.json

